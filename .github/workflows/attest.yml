name: Attest release artifacts

# Generates SLSA build-provenance attestations for every binary asset
# in a release, signed by GitHub Actions and recorded in Sigstore's
# transparency log. Verifiable downstream with `gh attestation verify`.
#
# Trigger design:
# - `workflow_run`: fires when the "Release" workflow completes
#   successfully. We use this instead of `release: published` because
#   cargo-dist's `host` job creates the GitHub Release via GITHUB_TOKEN,
#   and GitHub explicitly suppresses event cascading from GITHUB_TOKEN
#   actions — `release: published` simply never fires. `workflow_run`
#   bypasses that suppression because it's a workflow-completion event,
#   not a repo-content event.
# - `workflow_dispatch`: manual fallback so an operator can re-attest
#   a specific tag (e.g. v0.1.8 which shipped before this workflow
#   trigger fix landed). Always pass an explicit `tag` input.
#
# Standalone (not threaded into cargo-dist's release.yml) so it
# survives `cargo dist init` regeneration.

on:
  workflow_run:
    workflows: ["Release"]
    types: [completed]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to attest (e.g. v0.1.8). Required for manual dispatch.'
        required: true

permissions:
  # Required by actions/attest-build-provenance: it requests an OIDC token
  # to identify the workflow to Sigstore's transparency log.
  id-token: write
  # Required to upload the attestation back to the release's asset bundle.
  attestations: write
  # Read the release metadata (tag, asset list).
  contents: read

jobs:
  attest:
    runs-on: ubuntu-latest
    # For workflow_run: only fire when Release succeeded AND was
    # triggered by a tag push (head_branch starts with `v`). For
    # workflow_dispatch: always fire.
    if: |
      github.event_name == 'workflow_dispatch'
      || (github.event.workflow_run.conclusion == 'success'
          && startsWith(github.event.workflow_run.head_branch, 'v'))
    steps:
      - name: Download release assets
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.event.inputs.tag || github.event.workflow_run.head_branch }}
        run: |
          mkdir release-assets
          # Skip the source tarballs and installers — only the binaries
          # (`skillctl-*.tar.xz` / `*.zip`) need cryptographic provenance.
          gh release download "$TAG" \
            --dir release-assets \
            --pattern 'skillctl-*-apple-darwin*' \
            --pattern 'skillctl-*-unknown-linux-gnu*' \
            --pattern 'skillctl-*-pc-windows-msvc*'
          ls -la release-assets

      - name: Attest binaries
        uses: actions/attest-build-provenance@v3
        with:
          subject-path: 'release-assets/*'
