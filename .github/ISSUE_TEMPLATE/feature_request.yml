name: Feature request
description: Suggest a new feature or improvement.
title: "feat: "
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion. Please describe the **use case** first — the underlying need is more useful than a pre-decided solution.

        skillctl is intentionally narrow (the round-trip vision: push, detect, fork, pull). Features outside that scope will likely be deferred or pointed at `npx skills` — see the README's "Comparison with npx skills".

  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: A concrete situation where the tool falls short for you.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How you'd like it to work. Sketches, CLI signatures, and JSON shapes welcome.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Workarounds you've tried, or why an existing flag doesn't fit.

  - type: checkboxes
    id: checks
    attributes:
      label: Pre-flight checks
      options:
        - label: I checked the README and `.claude/skills/skillctl-usage/SKILL.md` for an existing flag that solves this.
          required: true
        - label: I searched existing issues and didn't find a duplicate.
          required: true
